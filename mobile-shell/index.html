<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>CHIBU</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .logo {
            width: 96px; height: 96px;
            border-radius: 24px;
            background: linear-gradient(135deg, #6366f1, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            box-shadow: 0 20px 40px rgba(99,102,241,0.4);
            margin-bottom: 24px;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 14px; max-width: 320px; line-height: 1.5; }
        .spinner {
            margin-top: 32px;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .err {
            display: none;
            margin-top: 24px; max-width: 320px;
            background: rgba(225,29,72,0.15);
            border: 1px solid rgba(225,29,72,0.3);
            color: #fecdd3;
            padding: 12px 16px; border-radius: 12px;
            font-size: 13px;
        }
        .retry {
            display: none;
            margin-top: 16px;
            background: #6366f1; color: white;
            border: none; padding: 12px 28px;
            border-radius: 12px;
            font-size: 14px; font-weight: 500;
            cursor: pointer;
        }
        .retry:active { transform: scale(0.97); }
        .footer { position: absolute; bottom: 24px; font-size: 11px; color: #475569; }
    </style>
</head>
<body>
    <div class="logo">📦</div>
    <h1>CHIBU</h1>
    <p id="msg">Server bilan ulanmoqda...</p>
    <div class="spinner" id="spinner"></div>
    <div class="err" id="err"></div>
    <button class="retry" id="retry">Qayta urinish</button>
    <div class="footer">v1.0.0</div>

    <script>
        // This screen is only shown if Capacitor's server.url fails to load.
        // When the device has internet and the server URL responds, Capacitor
        // automatically replaces this view with the live Laravel app.
        const msg = document.getElementById('msg');
        const err = document.getElementById('err');
        const spinner = document.getElementById('spinner');
        const retry = document.getElementById('retry');

        function showError(text) {
            spinner.style.display = 'none';
            err.style.display = 'block';
            err.textContent = text;
            retry.style.display = 'inline-block';
            msg.textContent = 'Ulanish xatosi';
        }

        retry.addEventListener('click', () => location.reload());

        // After 12s, if we're still on this page, show retry
        setTimeout(() => {
            if (document.body.contains(spinner) && spinner.style.display !== 'none') {
                showError('Internet aloqasini tekshiring va qayta urinib ko\'ring.');
            }
        }, 12000);
    </script>
</body>
</html>
